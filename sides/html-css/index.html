<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Advocato</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="navigation">
            <img src="https://github.com/Yagasaki7K/website-advocato/blob/main/public/logo-transparente.png?raw=true" alt="" />
            <h1>Advocato</h1>
        </div>

        <div class="consult">
            <h1>Consulta de processos de forma simples</h1>

            <div class="form">
                <input type="text" />
                <button>Buscar</button>
            </div>

            <p>Consulte intimações e movitações de forma clara e rápida</p>
        </div>

        <div class="info">
            <h1>Como funciona:</h1>

            <p><span>1</span> Digite o número do processo</p>
            <p><span>2</span> Nós buscamos as movimentações</p>
            <p><span>3</span> Você entende o que aconteceu</p>
        </div>

        <div class="info-security">
            <p>Dados públicos - Sem cadastro - Gratuito</p>
        </div>
    </body>
    <script src="script.js"></script>
</html>
